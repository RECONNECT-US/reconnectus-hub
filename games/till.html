<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US POS TRAINING SYSTEM</title><style>
body { margin:0; font-family:'Courier New', monospace; background:#111; color:#0f0; text-align:center; }
header { background:#000; padding:12px; }

#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.9);
  display:flex; align-items:center; justify-content:center;
  z-index:9999;
}

/* LEVELS */
.levels button {
  margin:5px;
  padding:8px 12px;
  background:#222;
  color:#0f0;
  border:none;
}
.locked { opacity:0.4; }
.active { background:#0f0; color:#000; }

.screen {
  background:#000;
  margin:20px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px #0f0;
}

.items { text-align:left; border-bottom:1px dashed #0f0; margin-bottom:10px; }
.line { display:flex; justify-content:space-between; }

.keypad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:15px;
}

.keypad button {
  padding:18px;
  background:#222;
  color:#0f0;
  border:none;
}

button.main {
  padding:10px 20px;
  margin:5px;
  background:#0f0;
  color:#000;
  border:none;
}

</style></head><body><header>RECONNECT-US TRAINING SYSTEM</header><div id="overlay" onclick="enterFullScreen()">Tap to start</div><div class="levels">
<button id="easyBtn" class="active" onclick="setLevel('easy')">Easy</button>
<button id="normalBtn" class="locked">🔒 Normal</button>
<button id="hardBtn" class="locked">🔒 Hard</button>
</div><div class="screen"><div id="operator"></div>
<div id="items"></div><div id="total"></div>
<div id="paid"></div>
<div id="input"></div>
<div id="suggestion"></div></div><div class="keypad">
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('.')">.</button>
<button onclick="press('0')">0</button>
<button onclick="clearInput()">C</button>
</div><button class="main" onclick="checkAnswer()">ENTER</button>
<button class="main" onclick="newSale()">NEW</button>

<div>
Score: <span id="score">0</span> |
Attempts: <span id="attempts">0</span> |
Accuracy: <span id="accuracy">0%</span>
</div><script>

let learner = localStorage.getItem("activeLearner") || "Guest";

let score=0, attempts=0;
let level="easy";

let unlocked = {
  easy:true,
  normal:false,
  hard:false
};

let items=[], total=0, paid=0, input="";

/* LOAD */
function load(){
  const data = JSON.parse(localStorage.getItem("learner_"+learner));
  if(data){
    score=data.score||0;
    attempts=data.attempts||0;
    unlocked=data.unlocked||unlocked;
  }
  updateStats();
  updateLevels();
}

/* SAVE */
function save(){
  localStorage.setItem("learner_"+learner, JSON.stringify({
    score, attempts, unlocked
  }));
}

/* LEVEL UI */
function updateLevels(){

  if(unlocked.normal){
    let btn=document.getElementById("normalBtn");
    btn.classList.remove("locked");
    btn.innerText="Normal";
    btn.onclick=()=>setLevel("normal");
  }

  if(unlocked.hard){
    let btn=document.getElementById("hardBtn");
    btn.classList.remove("locked");
    btn.innerText="Hard";
    btn.onclick=()=>setLevel("hard");
  }
}

/* SET LEVEL */
function setLevel(l){
  if(!unlocked[l]) return;
  level=l;
  newSale();
}

/* NEW SALE */
function newSale(){

  items=[];
  total=0;

  let count = level==="easy"?2:level==="normal"?3:4;

  for(let i=0;i<count;i++){
    let max = level==="easy"?5:level==="normal"?10:20;
    let price=(Math.random()*max+1).toFixed(2);
    items.push(price);
    total+=parseFloat(price);
  }

  total=total.toFixed(2);

  paid=[10,20,50][Math.floor(Math.random()*3)];
  if(paid<total) paid=50;

  display();

  clearInput();
}

/* DISPLAY */
function display(){
  let html="";
  items.forEach((p,i)=>{
    html+=`<div class="line">Item ${i+1}<span>£${p}</span></div>`;
  });
  document.getElementById("items").innerHTML=html;
  document.getElementById("total").innerText="TOTAL £"+total;
  document.getElementById("paid").innerText="PAID £"+paid;
}

/* INPUT */
function press(v){ input+=v; updateInput(); }
function clearInput(){ input=""; updateInput(); }

function updateInput(){
  document.getElementById("input").innerText="CHANGE £"+(input||"0.00");
}

/* CHECK */
function checkAnswer(){

  attempts++;

  let correct=(paid-total).toFixed(2);

  if(parseFloat(input).toFixed(2)===correct){
    score++;
    alert("Correct!");
    newSale();
  } else {
    alert("Incorrect £"+correct);
  }

  unlockCheck();
  save();
  updateStats();
}

/* UNLOCK SYSTEM */
function unlockCheck(){

  let acc = attempts ? (score/attempts)*100 : 0;

  if(acc>=70 && attempts>=5){
    if(level==="easy") unlocked.normal=true;
    if(level==="normal") unlocked.hard=true;
  }

  updateLevels();
}

/* STATS */
function updateStats(){
  document.getElementById("score").innerText=score;
  document.getElementById("attempts").innerText=attempts;
  let acc=attempts?Math.round((score/attempts)*100):0;
  document.getElementById("accuracy").innerText=acc+"%";
}

/* FULLSCREEN */
function enterFullScreen(){
  document.getElementById("overlay").style.display="none";
  document.documentElement.requestFullscreen();
}

/* INIT */
document.getElementById("operator").innerText="Operator: "+learner;
load();
newSale();

</script><footer style="font-size:12px;">
© Reconnect Us, All rights reserved
</footer></body>
</html>
