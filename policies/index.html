<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US • Policies</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  text-align:center;
  max-width:460px;
  width:100%;
}

h1{
  margin-bottom:20px;
}

.btn{
  display:block;
  margin:10px auto;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

.primary{
  background:#22d7c6;
  color:#042131;
}

.alt{
  background:#59a9ff;
  color:#042131;
}

.back{
  margin-top:20px;
  background:#444;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h1>Policies</h1>

  <button class="btn primary" onclick="go('safeguarding.html')">
    Safeguarding Policy
  </button>

  <button class="btn primary" onclick="go('gdpr.html')">
    Data Protection (GDPR)
  </button>

  <button class="btn primary" onclick="go('prevent.html')">
    Prevent Policy
  </button>

  <button class="btn alt" onclick="go('reporting.html')">
    Online Safety Reporting
  </button>

  <button class="btn alt" onclick="go('code-of-conduct.html')">
    Code of Conduct
  </button>

  <button class="btn alt" onclick="go('complaints.html')">
    Complaints Policy
  </button>

  <button class="btn alt" onclick="go('equality.html')">
    Equality & Diversity
  </button>

  <button class="btn back" onclick="backHome()">
    Back to Home
  </button>
</div>

<script>
function go(page){
  window.location.href = page;
}

function backHome(){
  window.location.href = "../index.html";
}
</script>

</body>
</html>
