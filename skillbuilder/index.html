<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US Skill Builder Apps</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#071a28,#0e3f5f);
  color:white;
}
.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:30px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}
.card{
  background:linear-gradient(135deg,#25c7c8,#7df1ef);
  color:#083340;
  padding:20px;
  border-radius:16px;
  font-weight:bold;
  text-align:center;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}
.card:hover{
  transform:translateY(-3px);
}
.sub{
  display:block;
  margin-top:8px;
  font-size:13px;
  font-weight:normal;
  line-height:1.4;
}
</style>
</head>
<body>

<div class="container">
  <h1>Skill Builder Apps</h1>

  <div class="grid">
    <div class="card" onclick="openPage('ai-skills-builder.html')">
      AI Skills Builder
      <span class="sub">TrainerReady Pro learning app</span>
    </div>

    <div class="card" onclick="openPage('qr-builder.html')">
      QR Builder
      <span class="sub">Create QR codes for websites, email, phone and text</span>
    </div>
  </div>
</div>

<script>
function openPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
